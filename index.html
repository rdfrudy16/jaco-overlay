<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jaco Overlay</title>

  <style>
    html, body {
      margin: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial;
    }

    #chat {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 90vw;
    }

    .bubble {
      padding: 8px 12px;
      border-radius: 16px;
      font-size: 14px;
      color: #000;
      background: rgba(255,255,255,0.85);
      display: flex;
      gap: 8px;
      max-width: 80vw;
      word-break: break-word;
    }

    .tiktok {
      border-left: 4px solid #ff2d55;
    }

    .jaco {
      border-left: 4px solid #ffd000;
    }

    .user {
      font-weight: bold;
      white-space: nowrap;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<script>
  const WS_URL = "wss://jaco-server.onrender.com";
  const chat = document.getElementById("chat");

  const ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    console.log("connected");
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type !== "chat") return;

    addMessage(data);
  };

  function addMessage(data) {
    const div = document.createElement("div");

    div.className = "bubble " + (data.source === "tiktok" ? "tiktok" : "jaco");

    const label = data.source === "tiktok" ? "🎵" : "🟡";

    div.innerHTML = `
      <span class="msg">${label} ${data.msg}</span>
      <span class="user">${data.user}</span>
    `;

    chat.appendChild(div);

    // keep last 15 messages
    while (chat.children.length > 15) {
      chat.removeChild(chat.firstChild);
    }
  }
</script>

</body>
</html>
