<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jaco Live Chat Overlay</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #chat {
      position: fixed;
      top: 10px;
      right: 10px;
      max-width: 100%;
      max-height: 100%;
      display: flex;
      flex-direction: column; /* newest at the bottom */
      align-items: flex-end;
      gap: 6px;
      pointer-events: none;
      user-select: none;
    }

    .chat-bubble {
      background: rgba(255, 255, 255, 0.85);
      color: black;
      padding: 8px 14px;
      border-radius: 18px;
      max-width: 80vw;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      justify-content: flex-start;
      text-align: left;
      pointer-events: auto;
      user-select: text;
      box-shadow: 0 0 5px rgba(0,0,0,0.15);
      font-size: 14px;
    }

    .msg {
      direction: ltr;
      unicode-bidi: plaintext;
    }

    .user {
      font-weight: bold;
      direction: ltr;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="chat">Waiting for chat...</div>

<script>
  const chatContainer = document.getElementById('chat');

  // Create WebSocket connection
  const ws = new WebSocket('ws://localhost:12345');

  console.log('[Overlay] WebSocket connecting...');

  ws.addEventListener('open', () => {
    console.log('[Overlay] WebSocket connected, readyState:', ws.readyState);
  });

  ws.addEventListener('message', (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.type === 'JACO_CHAT_UPDATE' && data.messages) {
        updateChat(data.messages);
      }
    } catch (e) {
      console.error('[Overlay] Invalid WebSocket message', e);
    }
  });

  ws.addEventListener('close', () => {
    console.log('[Overlay] WebSocket closed');
  });

  ws.addEventListener('error', (e) => {
    console.error('[Overlay] WebSocket error:', e);
  });

  // Optional fallback for postMessage from parent
  window.addEventListener('message', (event) => {
    if (!event.data || event.data.type !== 'JACO_CHAT_UPDATE') return;
    updateChat(event.data.messages);
  });

  function updateChat(messages) {
    if (!messages || messages.length === 0) {
      chatContainer.textContent = 'Waiting for chat...';
      return;
    }

    chatContainer.innerHTML = '';

    // Get the last 3 messages
    const lastMessages = messages.slice(-3);

    // Append messages oldest to newest
    lastMessages.forEach(msg => {
      const bubble = document.createElement('div');
      bubble.className = 'chat-bubble';

      // Parse username as last word, message is rest
      const parts = msg.trim().split(' ');
      const username = parts.pop();
      const messageText = parts.join(' ');

      const spanMsg = document.createElement('span');
      spanMsg.className = 'msg';
      spanMsg.textContent = messageText;

      const spanUser = document.createElement('span');
      spanUser.className = 'user';
      spanUser.textContent = username;

      bubble.appendChild(spanMsg);
      bubble.appendChild(spanUser);
      chatContainer.appendChild(bubble);
    });
  }
</script>

</body>
</html>
