<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jaco Live Chat Overlay</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #chat {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      pointer-events: none;
      user-select: none;
      max-width: 100%;
      max-height: 100%;
    }

    .chat-bubble {
      background: rgba(255, 255, 255, 0.85);
      color: black;
      padding: 8px 14px;
      border-radius: 18px;
      max-width: 80vw;
      display: flex;
      gap: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 0 5px rgba(0,0,0,0.15);
      font-size: 14px;
    }

    .msg {
      direction: ltr;
      unicode-bidi: plaintext;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user {
      font-weight: bold;
      white-space: nowrap;
    }
  </style>
</head>

<body>

<div id="chat">Waiting for chat...</div>

<script>
  const chatContainer = document.getElementById('chat');

  const WS_URL = "wss://jaco-server.onrender.com";

  let ws;

  function connect() {
    ws = new WebSocket(WS_URL);

    console.log("[Overlay] connecting...");

    ws.onopen = () => {
      console.log("[Overlay] connected");
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);

        if (data.type === "JACO_CHAT_UPDATE" && data.messages) {
          updateChat(data.messages);
        }

      } catch (e) {
        console.error("[Overlay] bad message", e);
      }
    };

    ws.onclose = () => {
      console.log("[Overlay] disconnected, retrying...");
      setTimeout(connect, 2000);
    };

    ws.onerror = () => {
      ws.close();
    };
  }

  connect();

  function updateChat(messages) {
    if (!messages || messages.length === 0) {
      chatContainer.textContent = "Waiting for chat...";
      return;
    }

    chatContainer.innerHTML = "";

    const lastMessages = messages.slice(-3);

    lastMessages.forEach((msg) => {
      const bubble = document.createElement("div");
      bubble.className = "chat-bubble";

      const parts = msg.trim().split(" ");
      const username = parts.pop();
      const messageText = parts.join(" ");

      const msgSpan = document.createElement("span");
      msgSpan.className = "msg";
      msgSpan.textContent = messageText;

      const userSpan = document.createElement("span");
      userSpan.className = "user";
      userSpan.textContent = username;

      bubble.appendChild(msgSpan);
      bubble.appendChild(userSpan);

      chatContainer.appendChild(bubble);
    });
  }
</script>

</body>
</html>
