<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Connect TikTok</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: Arial, sans-serif;
      color: white;
    }

    .box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 280px;
    }

    input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #fe2c55;
      color: white;
      font-weight: bold;
    }

    button:hover {
      background: #ff4d6d;
    }

    .title {
      text-align: center;
      font-size: 18px;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

  <div class="box">
    <div class="title">Connect TikTok Live</div>

    <input id="username" placeholder="Enter TikTok username" />

    <button onclick="connect()">Connect</button>
  </div>

  <script>
    const ws = new WebSocket("wss://jaco-server.onrender.com");

    function connect() {
      const username = document.getElementById("username").value.trim();

      if (!username) return;

      ws.send(JSON.stringify({
        type: "set_username",
        username
      }));

      // after sending, go to overlay
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
